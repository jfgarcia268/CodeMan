name: Build CodeMan desktop (macOS + Windows)

# Builds the CodeMan Electron installers — ONLY on a version tag (e.g. v3.2.0) —
# then publishes them to a GitHub Release. Three artifacts:
#   • CodeMan-<v>-arm64.dmg  (macOS Apple Silicon)   ┐ built on macos-14
#   • CodeMan-<v>-x64.dmg    (macOS Intel / x86_64)  ┘
#   • CodeMan-<v>.exe        (Windows x64, NSIS)       built on windows-latest
# Builds stay unsigned (no Apple dev cert / no Windows code-signing cert): first
# launch on each Mac still needs the `xattr` quarantine clear, and Windows shows a
# SmartScreen "unknown publisher" prompt (More info → Run anyway). See README.

on:
  push:
    tags: ['v*']

# Needed so the tag build can create/upload the GitHub Release with the default token.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon runner → builds arm64 + x64 dmgs
            build: npm run dist:mac
            artifacts: codeman-desktop/dist/*.dmg
          - os: windows-latest    # → Windows NSIS .exe
            build: npm run dist:win
            artifacts: codeman-desktop/dist/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codeman-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codeman-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash      # so `sed` works on the Windows runner too (git-bash = GNU sed)
        run: |
          V="${GITHUB_REF_NAME#v}"        # v3.2.0 → 3.2.0
          echo "Setting app version to $V"
          npm version "$V" --no-git-tag-version --allow-same-version
          # Keep the bundled web shell's footer + SW cache in sync (single source
          # of truth: codeman/version.js, read by the footer and sw.js).
          sed -i.bak "s/CODEMAN_VERSION = '[^']*'/CODEMAN_VERSION = '$V'/" ../codeman/version.js
          rm -f ../codeman/version.js.bak
          cat ../codeman/version.js

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # unsigned: don't hunt for a signing cert
        run: ${{ matrix.build }}

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: true
