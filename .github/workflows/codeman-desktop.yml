name: Build CodeMan desktop (macOS)

# Builds the CodeMan Electron .dmg on a macOS (Apple Silicon) runner — ONLY on a
# version tag (e.g. v3.2.0), which then publishes the .dmg to a GitHub Release.
# Build stays unsigned (no Apple dev cert), so first launch on each Mac still needs
# right-click → Open + the macOS Local Network prompt.

on:
  push:
    tags: ['v*']

# Needed so the tag build can create/upload the GitHub Release with the default token.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14            # Apple Silicon → arm64 .dmg (matches the target Macs)
    defaults:
      run:
        working-directory: codeman-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codeman-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          V="${GITHUB_REF_NAME#v}"        # v3.2.0 → 3.2.0
          echo "Setting app version to $V"
          npm version "$V" --no-git-tag-version --allow-same-version
          # Keep the bundled web shell's footer + SW cache in sync (single source
          # of truth: codeman/version.js, read by the footer and sw.js).
          sed -i.bak "s/CODEMAN_VERSION = '[^']*'/CODEMAN_VERSION = '$V'/" ../codeman/version.js
          rm -f ../codeman/version.js.bak
          cat ../codeman/version.js

      - name: Build .dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # unsigned: don't hunt for a signing cert
        run: npm run dist

      - name: Publish .dmg to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: codeman-desktop/dist/*.dmg
          fail_on_unmatched_files: true
